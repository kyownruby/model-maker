<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>model-maker viewer</title>
    <link rel="stylesheet" href="/src/style.css" />
    <!--
      Live2D Cubism Core（Cubism 3/4/5 モデル用ランタイム）
      ライセンス上 npm では配布されないため script タグで読み込む。
      `npm run setup:assets` で public/vendor/ に配置される。
      無い場合は main.ts 側で公式 CDN からのフォールバック読み込みを試みる。
    -->
    <script src="./vendor/live2dcubismcore.min.js"></script>
  </head>
  <body>
    <div id="app">
      <header id="toolbar">
        <h1>model-maker viewer</h1>
        <nav id="tabs">
          <button class="tab active" data-mode="vrm">VRM (3D)</button>
          <button class="tab" data-mode="live2d">Live2D (2D)</button>
        </nav>
        <span id="status">loading...</span>
      </header>
      <main id="layout">
        <div id="stage"></div>
        <aside id="panel">
          <div id="panel-header">
            <h2>Parameters</h2>
            <button id="reset-all">Reset All</button>
          </div>
          <div id="sliders"></div>
        </aside>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
